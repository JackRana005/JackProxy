<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Spider-Man · Hello Jack · Live clock & year bar</title>
  <!-- Google Fonts: Bangers for comic feel + clean monospace fallback -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c14; /* deep navy-black */
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', 'Courier New', monospace;
      padding: 1.5rem;
      margin: 0;
      position: relative;
    }

    /* Spider‑web SVG faintly etched in background */
    .spiderweb-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.08;
    }

    .spiderweb-bg svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* main card – dark, crisp, with red stripe at top */
    .dashboard {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 850px;
      background: rgba(10, 12, 20, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(180, 40, 40, 0.25);
      border-radius: 2.5rem 2.5rem 2rem 2rem;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(220, 50, 50, 0.15);
      padding: 0 0 2rem 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* animated red stripe at the top – like the suit */
    .red-stripe {
      height: 10px;
      width: 100%;
      background: linear-gradient(90deg, #b81c1c, #e63946, #c92a2a, #e63946, #b81c1c);
      background-size: 200% 100%;
      animation: stripeFlow 3s infinite linear;
      border-bottom: 1px solid #ff4d6d;
    }

    @keyframes stripeFlow {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* top right spider icon */
    .spider-icon-corner {
      position: absolute;
      top: 1.8rem;
      right: 1.8rem;
      z-index: 5;
      font-size: 2.5rem;
      filter: drop-shadow(0 0 8px #c92a2a);
      opacity: 0.9;
      pointer-events: none;
      transform: rotate(5deg);
    }

    /* content spacing */
    .content {
      padding: 1.5rem 2rem 1rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    /* ---- running text banner ---- */
    .banner-container {
      background: transparent;
      border-bottom: 1px dashed rgba(200, 40, 40, 0.5);
      padding-bottom: 0.6rem;
      margin-top: -0.2rem;
      position: relative;
      height: 70px;
      overflow: hidden;
      mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 12%, black 88%, transparent 100%);
    }

    .running-text {
      font-family: 'Bangers', 'Impact', cursive;
      font-size: 3.8rem;
      letter-spacing: 3px;
      color: #f0e6d2;
      text-shadow: 2px 2px 0 #b22222, 4px 4px 0 rgba(0,0,0,0.5), 0 0 15px #e63946;
      white-space: nowrap;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      left: 100%;
      animation: slideBanner 7s infinite ease-in-out;
      line-height: 1;
    }

    @keyframes slideBanner {
      0% { left: 100%; opacity: 0; }
      8% { left: 50%; transform: translate(-50%, -50%); opacity: 1; }
      92% { left: 50%; transform: translate(-50%, -50%); opacity: 1; }
      100% { left: -20%; opacity: 0; }
    }

    /* clock and date block */
    .time-date-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0.2rem 0 0.5rem 0;
    }

    .live-clock {
      font-family: 'Bangers', 'Impact', cursive;
      font-size: 4.2rem;
      letter-spacing: 4px;
      color: #f8f0e3;
      text-shadow: 0 0 15px #e63946, 0 0 30px #b22222;
      line-height: 1.2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
    }

    .blinking-colon {
      color: #e63946;
      text-shadow: 0 0 18px #ff4d6d;
      animation: blinkRed 1s step-end infinite;
    }

    @keyframes blinkRed {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.15; }
    }

    .full-date {
      font-family: 'Space Mono', 'Courier New', monospace;
      font-size: 1.2rem;
      font-weight: 400;
      color: #a7c0e0;
      background: rgba(20, 25, 40, 0.7);
      padding: 0.4rem 1.8rem;
      border-radius: 3rem;
      margin-top: 0.4rem;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
      border: 1px solid #2e3b5e;
      text-transform: uppercase;
      color: #c0d0f0;
    }

    /* ---- year progress bar ---- */
    .year-bar-section {
      margin-top: 0.8rem;
    }

    .bar-label {
      display: flex;
      justify-content: space-between;
      font-family: 'Bangers', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 1.5px;
      color: #b9c6e0;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
    }

    .progress-tube {
      position: relative;
      width: 100%;
      height: 32px;
      background: #141824;
      border-radius: 40px;
      border: 1px solid #3a3f5a;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.8), 0 0 12px rgba(200, 40, 40, 0.4);
      display: flex;
      overflow: hidden;
    }

    /* 12 segments inside the tube */
    .segments {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
    }

    .month-segment {
      flex: 1;
      height: 100%;
      border-right: 1px solid #23283b;
      position: relative;
      background: transparent;
      transition: background 0.2s;
    }

    .month-segment:last-child {
      border-right: none;
    }

    /* liquid fill overlay that animates */
    .liquid-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%; /* dynamically set via js */
      background: linear-gradient(90deg, #b22222, #e63946, #c92a2a);
      border-radius: 40px 0 0 40px;
      box-shadow: 0 0 15px #e63946;
      z-index: 1;
      transition: width 0.2s ease-out;
      overflow: hidden;
    }

    /* liquid animated effect (bubbling / flowing inside filled area) */
    .liquid-fill::after {
      content: "";
      position: absolute;
      top: -5px;
      left: 0;
      width: 100%;
      height: 120%;
      background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.3) 2px, transparent 4px),
                  radial-gradient(circle at 70% 60%, rgba(255, 200, 200, 0.4) 3px, transparent 5px),
                  linear-gradient(0deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 40%);
      background-size: 50px 25px, 70px 30px, 100% 100%;
      animation: bubbleFlow 2.5s infinite linear;
      opacity: 0.9;
      mix-blend-mode: overlay;
    }

    @keyframes bubbleFlow {
      0% { background-position: 0% 0%, 0% 0%, 0% 0%; }
      100% { background-position: 50px 25px, -30px 15px, 0% 0%; }
    }

    /* current month partial fill uses blue accent */
    .liquid-fill.current-month-fill {
      background: linear-gradient(90deg, #1e4b8c, #256bb0, #1f509e);
      box-shadow: 0 0 15px #3a86ff;
    }

    .liquid-fill.current-month-fill::after {
      background: radial-gradient(circle at 30% 40%, rgba(255, 255, 255, 0.4) 2px, transparent 4px),
                  radial-gradient(circle at 70% 60%, rgba(180, 220, 255, 0.5) 3px, transparent 5px),
                  linear-gradient(0deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 40%);
    }

    /* month labels under bar */
    .month-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      font-weight: bold;
      font-family: 'Space Mono', monospace;
      color: #8892b0;
      padding: 0 2px;
    }

    .month-labels span {
      text-align: center;
      width: 8%;
    }

    /* subtle spidey touches */
    .footer-note {
      text-align: right;
      margin-top: 0.4rem;
      font-size: 0.7rem;
      color: #5a6680;
      letter-spacing: 0.5px;
    }

    @media (max-width: 550px) {
      .running-text {
        font-size: 2.8rem;
      }
      .live-clock {
        font-size: 3rem;
      }
    }
  </style>
</head>
<body>
  <!-- faint spider web SVG background -->
  <div class="spiderweb-bg">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice" fill="none">
      <g stroke="#b22222" stroke-width="0.9" opacity="0.25">
        <!-- radial threads -->
        <line x1="500" y1="500" x2="0" y2="0"/>
        <line x1="500" y1="500" x2="1000" y2="0"/>
        <line x1="500" y1="500" x2="0" y2="1000"/>
        <line x1="500" y1="500" x2="1000" y2="1000"/>
        <line x1="500" y1="500" x2="500" y2="0"/>
        <line x1="500" y1="500" x2="500" y2="1000"/>
        <line x1="500" y1="500" x2="0" y2="500"/>
        <line x1="500" y1="500" x2="1000" y2="500"/>
        <!-- concentric polygons -->
        <polygon points="500,200 650,350 650,650 500,800 350,650 350,350" />
        <polygon points="500,280 590,410 590,590 500,720 410,590 410,410" />
        <polygon points="500,360 560,460 560,540 500,640 440,540 440,460" />
      </g>
    </svg>
  </div>

  <div class="dashboard">
    <!-- red animated stripe -->
    <div class="red-stripe"></div>

    <!-- spider icon top right -->
    <div class="spider-icon-corner" aria-hidden="true">🕷️</div>

    <div class="content">
      <!-- Running text banner: Hello Jack -->
      <div class="banner-container">
        <div class="running-text">HELLO JACK</div>
      </div>

      <!-- Live Clock + Date -->
      <div class="time-date-block">
        <div class="live-clock" id="liveClock">
          <span id="hours">00</span><span class="blinking-colon">:</span><span id="minutes">00</span><span class="blinking-colon">:</span><span id="seconds">00</span>
        </div>
        <div class="full-date" id="currentDate">Wednesday, 7 May 2026</div>
      </div>

      <!-- Liquid Year Progress Bar -->
      <div class="year-bar-section">
        <div class="bar-label">
          <span>📅 YEAR PROGRESS</span>
          <span id="yearPercent">~23%</span>
        </div>
        <div class="progress-tube" id="progressTube">
          <div class="liquid-fill" id="liquidFill"></div>
          <div class="segments" id="segmentsContainer"></div>
        </div>
        <div class="month-labels" id="monthLabels"></div>
        <div class="footer-note">
          <span>SPIDER-MAN · 2026</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // --- Spider-Man theme: fixed reference date 7 May 2026 (today) ---
      const REFERENCE_DATE = new Date(2026, 4, 7); // month 4 = May, day 7
      const YEAR = REFERENCE_DATE.getFullYear(); // 2026

      // Month names
      const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      
      // Build month segments and labels
      function buildSegmentsAndLabels() {
        const segmentsContainer = document.getElementById('segmentsContainer');
        const monthLabelsDiv = document.getElementById('monthLabels');
        segmentsContainer.innerHTML = '';
        monthLabelsDiv.innerHTML = '';
        
        for (let i = 0; i < 12; i++) {
          // segment div
          const seg = document.createElement('div');
          seg.className = 'month-segment';
          seg.dataset.month = i; // 0-index
          segmentsContainer.appendChild(seg);
          
          // label
          const labelSpan = document.createElement('span');
          labelSpan.textContent = MONTHS[i];
          monthLabelsDiv.appendChild(labelSpan);
        }
      }

      // Calculate progress based on current real time (or reference date logic)
      function getYearProgressData() {
        const now = new Date(); // live clock uses real time; year bar uses real time as well for consistency
        const currentYear = now.getFullYear();
        const currentMonth = now.getMonth(); // 0-11
        const currentDay = now.getDate();
        
        // Days in each month for current year (leap year safe)
        const daysInMonth = (monthIndex, year) => new Date(year, monthIndex + 1, 0).getDate();
        
        let totalDaysInYear = 0;
        for (let m = 0; m < 12; m++) {
          totalDaysInYear += daysInMonth(m, currentYear);
        }
        
        // Calculate elapsed days up to start of current month
        let elapsedDays = 0;
        for (let m = 0; m < currentMonth; m++) {
          elapsedDays += daysInMonth(m, currentYear);
        }
        // Add days passed in current month (today is included partially)
        const daysInCurrentMonth = daysInMonth(currentMonth, currentYear);
        const dayProgressInMonth = currentDay - 1; // e.g., 7th => 6 full days passed? We want partial fill based on how far into day.
        // More precise: fraction of day based on hours/minutes/seconds
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        const fractionOfDay = (hours * 3600 + minutes * 60 + seconds) / 86400;
        
        const preciseDayProgress = (currentDay - 1) + fractionOfDay;
        const totalElapsed = elapsedDays + preciseDayProgress;
        const yearFraction = totalElapsed / totalDaysInYear;
        
        return {
          currentMonth,
          currentDay,
          daysInCurrentMonth,
          fractionOfDay,
          yearFraction,
          totalDaysInYear,
          elapsedDays,
          preciseDayProgress,
          currentYear
        };
      }

      // Update liquid fill width and class
      function updateProgressBar() {
        const data = getYearProgressData();
        const liquidFill = document.getElementById('liquidFill');
        const yearPercentSpan = document.getElementById('yearPercent');
        if (!liquidFill || !yearPercentSpan) return;
        
        const percent = (data.yearFraction * 100).toFixed(1);
        yearPercentSpan.textContent = `~${percent}%`;
        
        // Set width of liquid fill
        liquidFill.style.width = `${Math.min(data.yearFraction * 100, 100)}%`;
        
        // Determine if current month fill should be blue accent
        // Past months fully filled (red), current month partial blue, future empty.
        // We handle visual by using class 'current-month-fill' when we are in partial month.
        // But we also need to keep full red for past months. The liquid fill spans whole width.
        // Better approach: liquid fill base red, but if we are in current month and not full,
        // we apply blue style for the partial part? The bar is continuous.
        // Spider-man spec: past months fill red, current month fills blue, future dark.
        // We'll simulate with gradient stops or use overlay. Simplest: If current month not December,
        // we keep liquid fill red for past, and for the portion representing current month we could use a second element.
        // But to maintain clean design, we'll set the liquid fill color based on whether we are past all months?
        // Alternative: use two layered fills. For clarity, we stick to: liquid fill red for all filled area,
        // but if current month is partially filled, we add class that changes gradient to blue for the whole fill?
        // That would miscolor past months. Better: compute width of past months fully filled, and current month partial.
        
        const pastMonthsWidthPercent = (() => {
          const totalDays = data.totalDaysInYear;
          if (totalDays === 0) return 0;
          let pastDays = 0;
          for (let m = 0; m < data.currentMonth; m++) {
            pastDays += new Date(data.currentYear, m + 1, 0).getDate();
          }
          return (pastDays / totalDays) * 100;
        })();
        
        // We set two layers: red base up to pastMonthsWidthPercent, then blue for current month part.
        // But since we have only one liquid-fill element, we can use a clever background with hard stop.
        const totalWidthPercent = Math.min(data.yearFraction * 100, 100);
        const redStop = pastMonthsWidthPercent;
        
        if (data.currentMonth === 11 && data.yearFraction >= 0.999) {
          // December fully filled: all red
          liquidFill.style.background = `linear-gradient(90deg, #b22222, #e63946, #c92a2a)`;
          liquidFill.classList.remove('current-month-fill');
        } else if (data.currentMonth >= 0 && data.yearFraction > 0) {
          // Use gradient with hard transition: red until pastMonthsWidthPercent, then blue
          // We need to set background based on width percentage.
          const redPart = Math.min(redStop, totalWidthPercent);
          const bluePart = totalWidthPercent - redPart;
          
          if (bluePart <= 0.1) {
            // essentially still past months or very start of month: all red
            liquidFill.style.background = `linear-gradient(90deg, #b22222, #e63946, #c92a2a)`;
            liquidFill.classList.remove('current-month-fill');
          } else {
            // gradient with hard stop: red up to redPart, then blue
            liquidFill.style.background = `linear-gradient(to right, #b22222 0%, #e63946 ${redPart}%, #1e4b8c ${redPart}%, #256bb0 ${totalWidthPercent}%, #1f509e ${totalWidthPercent}%)`;
            liquidFill.classList.add('current-month-fill'); // for bubble effect overlay
          }
        } else {
          liquidFill.style.background = `linear-gradient(90deg, #b22222, #e63946, #c92a2a)`;
          liquidFill.classList.remove('current-month-fill');
        }
        
        // Also update width
        liquidFill.style.width = `${totalWidthPercent}%`;
      }

      // Live clock update
      function updateClockAndDate() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        
        document.getElementById('hours').textContent = hours;
        document.getElementById('minutes').textContent = minutes;
        document.getElementById('seconds').textContent = seconds;
        
        // Format full date: e.g., Wednesday, 7 May 2026
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateString = now.toLocaleDateString('en-US', options);
        document.getElementById('currentDate').textContent = dateString;
        
        // Update progress bar as well (since it depends on time)
        updateProgressBar();
      }

      // Initialize everything
      buildSegmentsAndLabels();
      updateClockAndDate();
      
      // Update clock every second
      setInterval(updateClockAndDate, 1000);
      
      // Also ensure banner animation loops correctly (already via CSS infinite)
      // Additional subtle: re-trigger sometimes? Not needed.
    })();
  </script>
</body>
</html>
